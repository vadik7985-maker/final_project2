{% extends 'base.html' %}

{% block title %}Результат предсказания{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body text-center p-5">
                <h3 class="mb-4">Ваше предсказание</h3>
                
                <p class="fs-5 prediction-text">
                    "{{ cookie.text }}"
                </p>
                
                <p class="text-muted">
                    Категория: <strong>{{ cookie.category.name }}</strong>
                </p>

                <div class="mt-4">
                    <a href="{% url 'get_prediction' %}" class="btn btn-primary btn-lg me-3">
                        Получить ещё одно предсказание
                    </a>

                    <a href="{% url 'add_to_favorites' cookie.id %}?prediction_id={{ prediction.id }}" 
                       class="btn btn-outline-danger btn-lg">
                        В избранное
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
