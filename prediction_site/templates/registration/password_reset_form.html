{% extends 'base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Восстановление пароля</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted">Введите email адрес, указанный при регистрации.</p>

                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary btn-block mt-3">
                            Отправить ссылку для сброса
                        </button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'login' %}">← Вернуться ко входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
