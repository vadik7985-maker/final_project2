{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
    <h2>Вход в аккаунт</h2>

    {% if form.errors %}
        <p style="color: red;">Неверное имя пользователя или пароль</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>

    <p>
        <a href="{% url 'password_reset' %}">Забыли пароль?</a>
    </p>
{% endblock %}
