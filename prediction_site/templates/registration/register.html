{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
    <h2>Создать аккаунт</h2>
    
    {% if form.errors %}
        <p style="color: red;">Пожалуйста, исправьте ошибки в форме:</p>
        {{ form.errors }}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Зарегистрироваться</button>
    </form>

    <p>
        Уже есть аккаунт? 
        <a href="{% url 'login' %}">Войти</a>
    </p>
{% endblock %}
