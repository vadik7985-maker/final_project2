<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Предсказания на печеньках{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .prediction-item {
        margin-bottom: 20px;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 8px;
    }
    
    .prediction-text {
        font-size: 16px;
        margin-bottom: 10px;
        color: #333;
    }
    
    .prediction-meta {
        font-size: 14px;
        color: #666;
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
    }
    
    .btn-view {
        background: #007bff;
        color: white;
        padding: 5px 10px;
        border-radius: 4px;
        text-decoration: none;
        font-size: 12px;
    }
    
    .btn-view:hover {
        background: #0056b3;
        color: white;
    }
    </style>
</head>
<body>
    <div class="container mt-4">
        <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
            <div class="container">
                <a class="navbar-brand" href="{% url 'home' %}">Печеньки с предсказаниями</a>
                <div class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <span class="nav-link">Привет, {{ user.username }}!</span>
                        <a class="nav-link" href="{% url 'my_predictions' %}">Мои предсказания</a>
                        <form action="{% url 'logout' %}" method="post" style="display: inline;">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link" style="display: inline; background: none; border: none;">Выйти</button>
                        </form>
                    {% else %}
                        <a class="nav-link" href="{% url 'register' %}">Регистрация</a>
                        <a class="nav-link" href="{% url 'login' %}">Войти</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        {% if messages %}
            <div class="messages mb-4">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
