<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Предсказания на печеньках{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ФОН */
        body {
            background: linear-gradient(135deg, #1a002f, #3a0a5c, #6a0dad);
            min-height: 100vh;
            color: #f5e6ff;
        }

        /* КАРТОЧКИ */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 16px;
            color: #fff;
        }

        /* ЗАГОЛОВКИ */
        .card-header {
            background: linear-gradient(90deg, #ff66cc, #cc66ff);
            color: white !important;
            border-radius: 16px 16px 0 0 !important;
        }

        /* КНОПКИ */
        .btn-primary {
            background: linear-gradient(90deg, #ff66cc, #cc66ff);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-success {
            background: linear-gradient(90deg, #cc66ff, #9966ff);
            border: none;
        }

        /* НАВБАР */
        .navbar {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px);
            border-radius: 12px;
        }

        .navbar .nav-link,
        .navbar-brand {
            color: #f5e6ff !important;
        }

        .navbar .nav-link:hover {
            color: #ffccff !important;
        }

        /* ТАБЛИЦЫ */
        .table {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        /* заголовок */
        .table thead {
            background: rgba(0, 0, 0, 0.4);
        }

        /* строки */
        .table tbody tr {
            background: transparent;
            color: #f5e6ff;
        }

        /* hover эффект */
        .table-hover tbody tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* INPUT ПОЛЯ */
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #cc66ff;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ff99dd;
            box-shadow: 0 0 8px rgba(255, 153, 221, 0.6);
        }

        /* СТИЛИ ДЛЯ ЛОГИНА */
        label {
            color: #f5e6ff;
            margin-bottom: 5px;
            display: block;
        }

        /* ССЫЛКА ЗАБЫЛИ ПАРОЛЬ */
        a {
            color: #ff99dd;
        }

        a:hover {
            color: #ffccee;
        }
        /* АНИМАЦИЯ */
        .card {
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }
        /* БЕЙДЖИ */
        .badge {
            font-size: 0.8rem;
        }

         /* ЭРРОР ЛИСТЫ ДЛЯ РЕГИСТР */
        .errorlist {
            list-style: none;
            padding: 0;
            margin-top: 5px;
            color: #ff99dd;
            font-size: 0.9rem;
        }

        /* ПРЕДСКАЗАНИЕ */
        .prediction-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
        }

        /* КНОПКИ ССЫЛКИ */
        a {
            text-decoration: none;
        }
        .btn {
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 102, 204, 0.6);
        }


        .prediction-text {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #ffe6ff;
        }

        body, p, span, div, small, strong, h1, h2, h3, h4, h5 {
            color: #f5e6ff;
        }

        .text-muted {
            color: #d8b3ff !important;
        }

        .btn-outline-primary,
        .btn-outline-danger,
        .btn-outline-secondary,
        .btn-outline-warning {
            color: #ff99dd;
            border: 1px solid #ff99dd;
            background: transparent;
        }

        .btn-outline-primary:hover,
        .btn-outline-danger:hover,
        .btn-outline-secondary:hover,
        .btn-outline-warning:hover {
            background: #ff99dd;
            color: #2a003f;
        }

        .card,
        .card p,
        .card span,
        .card small {
            color: #f5e6ff !important;
        }

        .btn-outline-primary:hover,
        .btn-outline-danger:hover {
            box-shadow: 0 0 10px rgba(255, 153, 221, 0.7);
        }

        /* бейджи в таблице, категории */
        .badge.bg-primary {
            background: linear-gradient(90deg, #ff66cc, #cc66ff) !important;
        }
        /* бейджи в таблице, использования */
        .badge.bg-success {
            background: rgba(255, 153, 221, 0.2) !important;
            color: #ffccff !important;
            border: 1px solid #ff99dd;
        }
        /* выделение для топ3 */
        td:first-child {
            font-size: 1.2rem;
            font-weight: bold;
        }
        /* кнопка избранное в таблице с топом */
        .btn-outline-danger {
            color: #ff99dd !important;
            border-color: #ff99dd !important;
        }

        .btn-outline-danger:hover {
            background: #ff99dd !important;
            color: #2a003f !important;
        }
        /* вместо серых полос */
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: transparent !important;
        }

    </style>
</head>
<body>
    <div class="container mt-4">
        <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
            <div class="container">
               <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                    🔮 Печеньки с предсказаниями
               </a>
                <div class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <a class="nav-link" href="{% url 'my_predictions' %}">Мои предсказания</a>
                        <a class="nav-link" href="{% url 'favorites' %}">Избранное</a>
                        <a class="nav-link" href="{% url 'top_cookies' %}">Топ-10</a>
                        <a class="nav-link" href="{% url 'profile' %}">{{ user.username }}</a>

                        <form action="{% url 'logout' %}" method="post" style="display: inline;">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link"
                                    style="display: inline; background: none; border: none;">
                                Выйти
                            </button>
                        </form>
                    {% else %}
                        <a class="nav-link" href="{% url 'register' %}">Регистрация</a>
                        <a class="nav-link" href="{% url 'login' %}">Войти</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        {% if messages %}
            <div class="messages mb-4">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
