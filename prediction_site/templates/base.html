<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Предсказания на печеньках{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
/* ФОН */
body {
    background: linear-gradient(135deg, #1a002f, #3a0a5c, #6a0dad);
    min-height: 100vh;
    color: #f5e6ff;
}

/* КАРТОЧКИ */
.card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border: none;
    border-radius: 16px;
    color: #fff;
}

/* ЗАГОЛОВКИ */
.card-header {
    background: linear-gradient(90deg, #ff66cc, #cc66ff);
    color: white !important;
    border-radius: 16px 16px 0 0 !important;
}

/* КНОПКИ */
.btn-primary {
    background: linear-gradient(90deg, #ff66cc, #cc66ff);
    border: none;
}

.btn-primary:hover {
    opacity: 0.9;
}

.btn-success {
    background: linear-gradient(90deg, #cc66ff, #9966ff);
    border: none;
}

/* НАВБАР */
.navbar {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 12px;
}

.navbar .nav-link,
.navbar-brand {
    color: #f5e6ff !important;
}

.navbar .nav-link:hover {
    color: #ffccff !important;
}

/* ТАБЛИЦЫ */
.table {
    color: #fff;
}

.table thead {
    background: rgba(0, 0, 0, 0.4);
}

.table-hover tbody tr:hover {
    background: rgba(255, 255, 255, 0.1);
}

/* БЕЙДЖИ */
.badge {
    font-size: 0.8rem;
}

/* ПРЕДСКАЗАНИЕ */
.prediction-item {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 15px;
}

/* КНОПКИ ССЫЛКИ */
a {
    text-decoration: none;
}
</style>
</head>
<body>
    <div class="container mt-4">
        <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
            <div class="container">
                <a class="navbar-brand" href="{% url 'home' %}">Печеньки с предсказаниями</a>
                <div class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <a class="nav-link" href="{% url 'my_predictions' %}">Мои предсказания</a>
                        <a class="nav-link" href="{% url 'favorites' %}">Избранное</a>
                        <a class="nav-link" href="{% url 'top_cookies' %}">Топ-10</a>
                        <a class="nav-link" href="{% url 'profile' %}">{{ user.username }}</a>

                        <form action="{% url 'logout' %}" method="post" style="display: inline;">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link"
                                    style="display: inline; background: none; border: none;">
                                Выйти
                            </button>
                        </form>
                    {% else %}
                        <a class="nav-link" href="{% url 'register' %}">Регистрация</a>
                        <a class="nav-link" href="{% url 'login' %}">Войти</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        {% if messages %}
            <div class="messages mb-4">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
